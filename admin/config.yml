backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

site_url: https://azaleamv.netlify.app
display_url: https://azaleamv.netlify.app

editor:
  preview: false

collections:

  - name: "contact"
    label: "Contact Details"
    description: "Phone number, email and home port shown in the navbar, contact bar and footer."
    files:
      - name: "contact"
        label: "Contact Details"
        file: "content/site.json"
        fields:
          - label: "Phone Number"
            name: "phone"
            widget: "string"
            hint: "Shown in the navbar and contact bar — e.g. +960 778 1881"
            required: true
          - label: "Phone Link"
            name: "phone_href"
            widget: "string"
            hint: "Must start with tel: and have no spaces — e.g. tel:+9607781881"
            required: true
          - label: "Email Address"
            name: "email"
            widget: "string"
            hint: "Shown in the contact bar and footer"
            required: true
          - label: "Home Port"
            name: "home_port"
            widget: "string"
            hint: "Location shown in the contact bar — e.g. Malé, Maldives"
            required: true

  - name: "hero"
    label: "Hero Banner"
    description: "The full-screen slideshow and headline text visitors see first."
    files:
      - name: "hero"
        label: "Hero Banner"
        file: "content/hero.json"
        fields:
          - label: "Small Label (above heading)"
            name: "eyebrow"
            widget: "string"
            hint: "Short gold text above the main title — e.g. Luxury Yacht Experience · Maldives"
          - label: "Main Heading"
            name: "heading"
            widget: "string"
            hint: "Wrap one word in <em>word</em> to show it in italic gold — e.g. Sail into the <em>Heart</em> of Paradise"
            required: true
          - label: "Tagline"
            name: "tagline"
            widget: "text"
            hint: "One or two sentences shown below the heading"
            required: true
          - label: "Background Video URL"
            name: "video_url"
            widget: "string"
            required: false
            hint: "Optional — paste a direct .mp4 URL (e.g. from Cloudflare R2 or your own host). When set, the video replaces the slideshow on desktop. Leave blank to keep the photo slideshow."
          - label: "Slideshow Image 1"
            name: "slide_1"
            widget: "image"
            hint: "Landscape photo, at least 1920 × 1080 px. Shown on mobile and when no video is set."
            required: true
          - label: "Slideshow Image 2"
            name: "slide_2"
            widget: "image"
            hint: "Landscape photo, at least 1920 × 1080 px"
            required: true
          - label: "Slideshow Image 3"
            name: "slide_3"
            widget: "image"
            hint: "Landscape photo, at least 1920 × 1080 px"
            required: true
          - label: "Slideshow Image 4"
            name: "slide_4"
            widget: "image"
            hint: "Landscape photo, at least 1920 × 1080 px"
            required: true

  - name: "stats"
    label: "Stats Bar"
    description: "The four highlight numbers shown in the dark bar beneath the hero image."
    files:
      - name: "stats"
        label: "Stats Bar"
        file: "content/stats.json"
        fields:
          - label: "Stats"
            name: "stats"
            widget: "list"
            min: 4
            max: 4
            hint: "Exactly 4 stats — click one to edit it."
            summary: "{{number}}  {{label}}"
            fields:
              - label: "Number"
                name: "number"
                widget: "string"
                hint: "e.g. 12+ or 98%"
                required: true
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "e.g. Years of Excellence"
                required: true

  - name: "about"
    label: "About Section"
    description: "The 'Our Story' section with two paragraphs and two photos."
    files:
      - name: "about"
        label: "About Section"
        file: "content/about.json"
        fields:
          - label: "Small Label (above heading)"
            name: "eyebrow"
            widget: "string"
            hint: "e.g. Our Story"
          - label: "Section Heading"
            name: "heading"
            widget: "string"
            required: true
          - label: "First Paragraph"
            name: "body_1"
            widget: "text"
            required: true
          - label: "Second Paragraph"
            name: "body_2"
            widget: "text"
          - label: "Main Photo"
            name: "image_main"
            widget: "image"
            hint: "Large photo on the left side — portrait or landscape"
          - label: "Accent Photo"
            name: "image_accent"
            widget: "image"
            hint: "Smaller overlapping photo — portrait works best"

  - name: "experiences"
    label: "Experiences"
    description: "The six experience cards (Reef & Dive, Private Dining, etc.)."
    files:
      - name: "experiences"
        label: "Experiences"
        file: "content/experiences.json"
        fields:
          - label: "Experience Cards"
            name: "experiences"
            widget: "list"
            hint: "Click a card to edit it, or use the Add button to create a new one."
            summary: "{{title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                required: true
              - label: "Short Description"
                name: "description"
                widget: "text"
                hint: "One or two sentences shown on the card"
                required: true
              - label: "Card Photo"
                name: "image"
                widget: "image"
                hint: "Square or landscape photo — will be cropped to fill the card"
                required: true

  - name: "yacht"
    label: "The Yacht"
    description: "The 'The Azalea' section — text, specs table and gallery photos."
    files:
      - name: "yacht"
        label: "The Yacht"
        file: "content/yacht.json"
        fields:
          - label: "Small Label (above heading)"
            name: "eyebrow"
            widget: "string"
            hint: "e.g. The Vessel"
          - label: "Heading"
            name: "heading"
            widget: "string"
            required: true
          - label: "First Paragraph"
            name: "body_1"
            widget: "text"
            required: true
          - label: "Second Paragraph"
            name: "body_2"
            widget: "text"
          - label: "Specifications"
            name: "specs"
            widget: "list"
            min: 6
            max: 6
            hint: "Exactly 6 rows — click a row to edit it."
            summary: "{{label}}: {{value}}"
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "e.g. Length"
                required: true
              - label: "Value"
                name: "value"
                widget: "string"
                hint: "e.g. 28 metres"
                required: true
          - label: "Main Photo"
            name: "image_main"
            widget: "image"
            hint: "Large yacht photo — landscape recommended"
          - label: "Gallery Photo 1"
            name: "image_strip_1"
            widget: "image"
            hint: "Smaller photo shown in the bottom-left of the gallery"
          - label: "Gallery Photo 2"
            name: "image_strip_2"
            widget: "image"
            hint: "Smaller photo shown in the bottom-right of the gallery"

          - label: "Cinematic Tour Gallery"
            name: "gallery"
            widget: "list"
            hint: "Photos shown in the 'Begin Tour' cinematic experience. Click a row to edit, drag to reorder."
            summary: "{{room}} — {{caption}}"
            fields:
              - { label: "Photo", name: "image", widget: "image", required: true, hint: "High-res landscape photo, at least 1920 × 1080 px" }
              - { label: "Room Name", name: "room", widget: "string", required: true, hint: "Main title shown on screen — e.g. Master Suite" }
              - { label: "Caption", name: "caption", widget: "string", hint: "Short line below room name — e.g. Private deck access · Ocean view" }
              - { label: "Category", name: "category", widget: "select", options: ["Exterior", "Cabins", "Dining", "Deck", "Bathrooms"], hint: "Groups photos in the Rooms side menu" }
              - label: "Cabin Description"
                name: "description"
                widget: "text"
                required: false
                hint: "Cabins only — 2-3 sentences shown in the Accommodation section and the tour detail panel. Leave blank for non-cabin slides."
              - label: "Cabin Features"
                name: "features"
                widget: "list"
                required: false
                hint: "Cabins only — one amenity per line (e.g. King-size bed · Jacuzzi · Ocean view). Leave blank for non-cabin slides."
                field: { label: "Feature", name: "feature", widget: "string" }

  - name: "destinations"
    label: "Destinations"
    description: "The five destination cards (North Malé Atoll, Baa Atoll, etc.)."
    files:
      - name: "destinations"
        label: "Destinations"
        file: "content/destinations.json"
        fields:
          - label: "Destination Cards"
            name: "destinations"
            widget: "list"
            min: 5
            max: 5
            hint: "Exactly 5 destinations — click a card to edit it."
            summary: "{{name}}"
            fields:
              - label: "Destination Name"
                name: "name"
                widget: "string"
                required: true
              - label: "Subtitle"
                name: "subtitle"
                widget: "string"
                hint: "Short tagline — e.g. UNESCO Biosphere Reserve"
              - label: "Photo"
                name: "image"
                widget: "image"
                hint: "Square or portrait photo works best"
                required: true

  - name: "testimonials"
    label: "Guest Reviews"
    description: "Three guest reviews shown on the site. Source your reviews from Tripadvisor — copy the review text, guest name and date."
    files:
      - name: "testimonials"
        label: "Guest Reviews"
        file: "content/testimonials.json"
        fields:
          - label: "Reviews"
            name: "testimonials"
            widget: "list"
            min: 3
            max: 3
            hint: "Exactly 3 reviews. Tip — copy from Tripadvisor: azaleacruise.com/admin/#tripadvisor"
            summary: "{{name}} — {{origin}}"
            fields:
              - label: "Review Text"
                name: "quote"
                widget: "text"
                hint: "Paste the review text from Tripadvisor. Do not add quotation marks — they are added automatically."
                required: true
              - label: "Guest Name"
                name: "name"
                widget: "string"
                hint: "As shown on Tripadvisor — e.g. Lilian L."
                required: true
              - label: "Guest Location / Date"
                name: "origin"
                widget: "string"
                hint: "Location or date from Tripadvisor — e.g. Perth, Australia or July 2024"
              - label: "Guest Photo"
                name: "avatar"
                widget: "string"
                hint: "Leave as-is to use initials avatar. Or paste a direct image URL. Format: https://ui-avatars.com/api/?name=First+Last&background=09131F&color=C9A468&bold=true&size=100"

  - name: "booking"
    label: "Booking Section"
    description: "Text shown in the 'Begin Your Voyage' enquiry section."
    files:
      - name: "booking"
        label: "Booking Section"
        file: "content/booking.json"
        fields:
          - label: "Small Label (above heading)"
            name: "eyebrow"
            widget: "string"
            hint: "e.g. Plan Your Escape"
          - label: "Section Heading"
            name: "heading"
            widget: "string"
            required: true
          - label: "First Paragraph"
            name: "body_1"
            widget: "text"
            required: true
          - label: "Second Paragraph"
            name: "body_2"
            widget: "text"
